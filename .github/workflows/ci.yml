name: Publish to Node

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node
        id: setup_node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.33.3

      - name: Install core dependencies
        run: pnpm install --filter @degenlab/stacks-wallet-kit-core --frozen-lockfile

      - name: Build core
        run: pnpm --filter @degenlab/stacks-wallet-kit-core build

      - name: Publish core to npm
        run: |
          cd packages/core

          VERSION=$(node -p "require('./package.json').version")
          PKG=$(node -p "require('./package.json').name")

          if npm view $PKG@$VERSION > /dev/null 2>&1; then
            echo "Version $VERSION already exists. Skipping publish."
            exit 0
          fi

          pnpm publish --no-git-checks --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Install mobile and extension dependencies
        run: pnpm install --frozen-lockfile

      - name: Build mobile and extension
        run: |
          pnpm --filter @degenlab/stacks-wallet-kit-mobile build
          pnpm --filter @degenlab/stacks-wallet-kit-extension build

      - name: Publish mobile to npm
        run: |
          cd packages/mobile

          VERSION=$(node -p "require('./package.json').version")
          PKG=$(node -p "require('./package.json').name")

          if npm view $PKG@$VERSION > /dev/null 2>&1; then
            echo "Version $VERSION already exists. Skipping publish."
            exit 0
          fi

          pnpm publish --no-git-checks --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Publish extension to npm
        run: |
          cd packages/extension

          VERSION=$(node -p "require('./package.json').version")
          PKG=$(node -p "require('./package.json').name")

          if npm view $PKG@$VERSION > /dev/null 2>&1; then
            echo "Version $VERSION already exists. Skipping publish."
            exit 0
          fi

          pnpm publish --no-git-checks --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: true
