name: Publish to Node

on:
  push:
    branches:
      - develop
    paths-ignore:
      - '**.yml'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        id: checkout_code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node
        id: setup_node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.18.0

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install core dependencies
        run: |
          cd packages/core
          pnpm install --frozen-lockfile

      - name: Lint core
        run: |
          cd packages/core
          pnpm run lint

      - name: Format core
        run: |
          cd packages/core
          pnpm run format:check

      - name: Run core test
        run: |
          cd packages/core
          pnpm run test

      - name: Build core
        run: pnpm --filter @degenlab/stacks-wallet-kit-core build

      - name: Publish core to npm
        run: |
          cd packages/core
          npm publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Install mobile and extension dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format
        run: pnpm run format:check

      - name: Run Test
        run: pnpm run test

      - name: Build all packages
        run: pnpm run build

      - name: Publish mobile to npm
        run: |
          cd packages/mobile
          npm publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Publish extension to npm
        run: |
          cd packages/extension
          npm publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: true
